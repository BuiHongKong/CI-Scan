apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-scan-app
  namespace: ci-scan
  labels:
    app: ci-scan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ci-scan
  template:
    metadata:
      labels:
        app: ci-scan
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ci-scan
          image: node:20-alpine@sha256:658d0f63e501824d6c23e06a5bbf87293b7a965b78495e32861d341bb0399855
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "process.exit(0)"
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "process.exit(0)"
            initialDelaySeconds: 5
            periodSeconds: 10
