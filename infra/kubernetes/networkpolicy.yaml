apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ci-scan-netpol
  namespace: ci-scan
  labels:
    app: ci-scan
spec:
  podSelector:
    matchLabels:
      app: ci-scan
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ci-scan
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
